<!DOCTYPE html>
<html>
<head>
  <title>Snowy Lua Generator</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 40px;
    }
    input{
      padding: 8px;
      margin: 5px 0;
      width: 300px;
    }
    button{
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 10px;
    }
    pre{
      background: #222;
      padding: 20px;
      margin-top: 20px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

<h2>Lua Script Generator</h2>

<label>File Count</label><br>
<input id="count" type="number" value="5"><br>

<label>File Content</label><br>
<input id="content" value="Snowy Test"><br>

<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
async function generate() {
  const count = document.getElementById("count").value;
  const content = document.getElementById("content").value;

  try {
    const res = await fetch("https://backendloadstringgen.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fileCount: count,
        fileContent: content
      })
    });

    if (!res.ok) {
      const errorText = await res.text();
      document.getElementById("output").textContent = "Error: " + errorText;
      return;
    }

    const data = await res.json();
    document.getElementById("output").textContent = data.links.join("\n");
  } catch (err) {
    document.getElementById("output").textContent = "Error: " + err.message;
  }
}
</script>

</body>
</html>
